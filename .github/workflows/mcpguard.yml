name: MCPGuard CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint Type Security Test Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.lock
          python -m pip install -e .

      - name: Ruff lint
        run: ruff check .

      - name: Mypy
        run: mypy src

      - name: Bandit
        run: bandit -c pyproject.toml -r src/mcpguard

      - name: Unit tests
        run: python -m pytest -q

      - name: Build wheel
        run: python -m build --wheel

      - name: MCPGuard gate
        run: mcpguard mcp test basic-demo --fail-on high

      - name: MCPGuard JSON report
        run: mcpguard mcp test basic-demo --format json --output mcpguard-report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: mcpguard-report
          path: mcpguard-report.json
