name: MCPGuard

on:
  pull_request:
  workflow_dispatch:

jobs:
  mcpguard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Unit tests
        run: pytest -q

      - name: MCPGuard gate
        run: mcpguard mcp test basic-demo --fail-on high

      - name: MCPGuard JSON report
        run: mcpguard mcp test basic-demo --format json --output mcpguard-report.json

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: mcpguard-report
          path: mcpguard-report.json
