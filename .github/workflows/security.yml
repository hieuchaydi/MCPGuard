name: Security

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  sbom-and-scan:
    name: SBOM and Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Syft and Trivy
        run: |
          set -eux
          SYFT_VERSION="v1.24.0"
          TRIVY_VERSION="v0.70.0"
          curl -fsSL "https://github.com/anchore/syft/releases/download/${SYFT_VERSION}/syft_${SYFT_VERSION#v}_linux_amd64.tar.gz" -o syft.tgz
          tar -xzf syft.tgz syft
          sudo mv syft /usr/local/bin/syft
          rm -f syft.tgz

          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${TRIVY_VERSION#v}_Linux-64bit.tar.gz" -o trivy.tgz
          tar -xzf trivy.tgz trivy
          sudo mv trivy /usr/local/bin/trivy
          rm -f trivy.tgz

      - name: Generate SBOM (SPDX-JSON)
        run: syft dir:. -o spdx-json=sbom.spdx.json

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom-spdx
          path: sbom.spdx.json

      - name: Run Trivy filesystem scan (SARIF)
        run: |
          trivy fs . \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-fs.sarif || true

      - name: Upload Trivy FS SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        with:
          sarif_file: trivy-fs.sarif

  container-scan:
    name: Container Image Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t mcpguard:ci .

      - name: Install Trivy
        run: |
          set -eux
          TRIVY_VERSION="v0.70.0"
          curl -fsSL "https://github.com/aquasecurity/trivy/releases/download/${TRIVY_VERSION}/trivy_${TRIVY_VERSION#v}_Linux-64bit.tar.gz" -o trivy.tgz
          tar -xzf trivy.tgz trivy
          sudo mv trivy /usr/local/bin/trivy
          rm -f trivy.tgz

      - name: Run Trivy image scan (SARIF)
        run: |
          trivy image mcpguard:ci \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --format sarif \
            --output trivy-image.sarif || true

      - name: Upload Trivy image SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false)
        with:
          sarif_file: trivy-image.sarif
