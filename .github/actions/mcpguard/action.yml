name: MCPGuard
description: Run MCPGuard trust evaluation against an MCP target.

inputs:
  target:
    description: Saved MCP target name from mcpguard.servers.yaml.
    required: true
  fail-on:
    description: Severity threshold that fails the job.
    required: false
    default: high
  python-version:
    description: Python version used to install and run MCPGuard.
    required: false
    default: "3.12"
  sarif-output:
    description: SARIF output path.
    required: false
    default: mcpguard.sarif

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: pip

    - name: Install MCPGuard
      shell: bash
      run: python -m pip install -e .[dev]

    - name: Run MCPGuard gate
      shell: bash
      run: mcpguard mcp test "${{ inputs.target }}" --fail-on "${{ inputs.fail-on }}"

    - name: Generate SARIF
      if: always()
      shell: bash
      run: mcpguard mcp test "${{ inputs.target }}" --format sarif --output "${{ inputs.sarif-output }}" || true
