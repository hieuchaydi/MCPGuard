version: "3.9"

services:
  mcpguard:
    image: ghcr.io/your-org/mcpguard:latest
    restart: unless-stopped
    command: ["mcp", "test", "--config", "/app/mcpguard.yaml", "--fail-on", "high"]
    read_only: true
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    healthcheck:
      test: ["CMD", "mcpguard", "--help"]
      interval: 30s
      timeout: 10s
      retries: 3
