apiVersion: batch/v1
kind: CronJob
metadata:
  name: mcpguard-scan
  labels:
    app: mcpguard
spec:
  schedule: "*/30 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        metadata:
          labels:
            app: mcpguard
        spec:
          restartPolicy: Never
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            fsGroup: 10001
          containers:
            - name: mcpguard
              image: ghcr.io/your-org/mcpguard:latest
              imagePullPolicy: IfNotPresent
              args: ["mcp", "test", "--config", "/app/mcpguard.yaml", "--fail-on", "high"]
              resources:
                requests:
                  cpu: "100m"
                  memory: "128Mi"
                limits:
                  cpu: "500m"
                  memory: "512Mi"
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
