server:
  command: "python examples/basic_server/server.py"

policy:
  fail_on: "high"

schema:
  require_input_schema: true
  require_descriptions: true
  require_required_fields: true
  require_max_for_numbers: true

timeout:
  timeout_ms: 10000
  warn_after_ms: 3000

secret:
  enabled: true

tools:
  read_file:
    allow_paths:
      - "./docs"
      - "./src"
    deny_paths:
      - ".env"
      - "~/.ssh"
    network: false

checks:
  prompt_injection:
    enabled: true
    scan_description: true
    scan_output: true
